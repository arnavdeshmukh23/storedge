<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign Up — Storedge</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--sky:#00AEEF;--sky-glow:rgba(0,174,239,0.45);--green:#00e5a0;--bg:#06090f;--surface:#0d1320;--border:rgba(255,255,255,0.08);--text:#e8edf5;--muted:rgba(232,237,245,0.45);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 50% at 30% 20%,rgba(0,174,239,0.08) 0%,transparent 60%),radial-gradient(ellipse 30% 30% at 80% 80%,rgba(0,229,160,0.06) 0%,transparent 60%);pointer-events:none;}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 30%,transparent 80%);pointer-events:none;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:48px 44px;width:100%;max-width:440px;position:relative;animation:cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;}
    @keyframes cardIn{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
    .card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:50%;height:1px;background:linear-gradient(90deg,transparent,var(--sky),transparent);}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;background:linear-gradient(135deg,#fff,var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:32px;display:block;text-decoration:none;}
    h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
    .sub{font-size:14px;color:var(--muted);margin-bottom:32px;}
    .sub a{color:var(--sky);text-decoration:none;}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;margin-top:20px;}
    input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
    input::placeholder{color:rgba(255,255,255,0.2);}
    input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(0,174,239,0.1);}
    .plan-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:20px;}
    .plan-opt{border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:13px;}
    .plan-opt.sel{border-color:var(--sky);background:rgba(0,174,239,0.1);color:var(--sky);}
    .plan-opt .badge{display:block;font-size:11px;color:var(--muted);margin-top:3px;}
    .plan-opt.sel .badge{color:rgba(0,174,239,0.7);}
    .terms{font-size:12px;color:var(--muted);margin-top:16px;line-height:1.6;}
    .terms a{color:var(--sky);text-decoration:none;}
    .btn-submit{width:100%;margin-top:24px;padding:14px;background:linear-gradient(135deg,var(--sky),var(--green));border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;color:#06090f;cursor:pointer;transition:all 0.25s;}
    .btn-submit:hover{box-shadow:0 0 28px var(--sky-glow);filter:brightness(1.1);}
    .divider{display:flex;align-items:center;gap:16px;margin:24px 0;color:var(--muted);font-size:13px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .btn-google{width:100%;padding:13px;background:transparent;border:1px solid var(--border);border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;}
    .btn-google:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);}
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="card">
    <a href="index.html" class="logo">Storedge</a>
    <h1>Create your account ✨</h1>
    <p class="sub">Already have one? <a href="login.html">Log in →</a></p>
    <form onsubmit="return false">
      <div class="row">
        <div><label>First name</label><input type="text" placeholder="Arnav"/></div>
        <div><label>Last name</label><input type="text" placeholder="Sharma"/></div>
      </div>
      <label>Email address</label>
      <input type="email" placeholder="you@example.com"/>
      <label>Password</label>
      <input type="password" placeholder="Min. 8 characters"/>
      <label style="margin-bottom:10px">Choose a plan</label>
      <div class="plan-row" id="plans">
        <div class="plan-opt" onclick="sel(this)"><strong>Free</strong><span class="badge">5 GB</span></div>
        <div class="plan-opt sel" onclick="sel(this)"><strong>Pro</strong><span class="badge">100 GB</span></div>
        <div class="plan-opt" onclick="sel(this)"><strong>Team</strong><span class="badge">1 TB</span></div>
      </div>
      <p class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
      <button class="btn-submit" onclick="signup()">Create account →</button>
    </form>
    <div class="divider">or</div>
    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.7 29.2 37 24 37a13 13 0 0 1 0-26c3.1 0 5.9 1.1 8.1 2.9l5.7-5.7A21 21 0 1 0 45 24c0-1.4-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8A13 13 0 0 1 24 11c3.1 0 5.9 1.1 8.1 2.9l5.7-5.7A21 21 0 0 0 6.3 14.7z"/><path fill="#4CAF50" d="M24 45a21 21 0 0 0 14.6-5.9l-6.7-5.5A13 13 0 0 1 24 37a13 13 0 0 1-12.4-9.1l-6.6 5.1A21 21 0 0 0 24 45z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.4-2.5 4.4-4.7 5.6l6.7 5.5C41.7 35.4 45 30.1 45 24c0-1.4-.1-2.7-.4-4z"/></svg>
      Continue with Google
    </button>
  </div>
  <script>
    function sel(el){document.querySelectorAll('.plan-opt').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');}
    <script src="js/auth.js">
  </script>
</body>
</html>
